name: CI

# Pure CI: pull requests and feature branches. Pushes to master/preview go through
# release.yml, which runs the same matrix before semantic-release.
on:
  push:
    branches-ignore: [master, preview]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore eQuantic.Core.Outcomes.sln
      - name: Build
        run: dotnet build eQuantic.Core.Outcomes.sln -c Release --no-restore
      - name: Test (net8.0 + net10.0)
        run: dotnet test eQuantic.Core.Outcomes.sln -c Release --no-build --logger "console;verbosity=minimal"

  pack:
    name: Pack (smoke)
    needs: build-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Pack all packages
        run: |
          for project in src/*/*.csproj; do
            dotnet pack "$project" -c Release
          done
      - uses: actions/upload-artifact@v4
        with:
          name: packages
          path: artifacts/*nupkg
