name: Release

# semantic-release drives everything: version from commit messages, CHANGELOG,
# git tag, GitHub release and NuGet publish. Releases happen only when commits
# since the last tag warrant one (feat/fix/perf/breaking). The release commit
# carries [skip ci], so it never re-triggers this workflow.
on:
  push:
    branches: [master, preview]
  workflow_dispatch:

permissions:
  contents: read

# One release at a time per branch; never cancel a release midway.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Restore
        run: dotnet restore eQuantic.Core.Outcomes.sln
      - name: Build
        run: dotnet build eQuantic.Core.Outcomes.sln -c Release --no-restore
      - name: Test (net8.0 + net10.0)
        run: dotnet test eQuantic.Core.Outcomes.sln -c Release --no-build --logger "console;verbosity=minimal"

  release:
    name: Semantic release
    needs: test
    runs-on: ubuntu-latest
    environment: nuget
    permissions:
      contents: write        # push tag + release commit, create the GitHub release
      issues: write          # open an issue if a release fails
      pull-requests: write   # comment on released PRs
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0          # semantic-release needs full history and tags
          persist-credentials: false
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      # conventional-changelog-conventionalcommits must stay on v8: v9+ targets a newer
      # conventional-changelog stack than semantic-release bundles — the analyzer still
      # works but release notes silently come out empty.
      - name: Semantic release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
          GIT_AUTHOR_NAME: eQuantic Release Bot
          GIT_AUTHOR_EMAIL: noreply@equantic.tech
          GIT_COMMITTER_NAME: eQuantic Release Bot
          GIT_COMMITTER_EMAIL: noreply@equantic.tech
        run: >
          npx --yes
          -p semantic-release@25
          -p @semantic-release/changelog@6
          -p @semantic-release/exec@7
          -p @semantic-release/git@10
          -p conventional-changelog-conventionalcommits@8
          semantic-release
